# This is a Databricks asset bundle definition for de_agent.
# See https://docs.databricks.com/dev-tools/bundles/index.html for documentation.
bundle:
  name: de_agent
  uuid: 683d3667-607b-43f0-8727-8734b941f2be

include:
  - resources/*.yml
  - resources/*/*.yml

# Variable declarations. These variables are assigned in the dev/prod targets below.
variables:
  catalog:
    description: The catalog to use
  schema:
    description: The schema to use

targets:
  dev:
    # The default target uses 'mode: development' to create a development copy.
    # - Deployed resources get prefixed with '[dev my_user_name]'
    # - Any job schedules and triggers are paused by default.
    # See also https://docs.databricks.com/dev-tools/bundles/deployment-modes.html.
    mode: development
    default: true
    workspace:
      host: https://adb-3438839487639471.11.azuredatabricks.net
    variables:
      catalog: demo
      schema: dev
  prod:
    mode: production
    workspace:
      host: https://adb-3438839487639471.11.azuredatabricks.net
      # We explicitly deploy to /Workspace/Users/scott.johnson@databricks.com to make sure we only have a single copy.
      root_path: /Workspace/Users/scott.johnson@databricks.com/.bundle/${bundle.name}/${bundle.target}
    variables:
      catalog: demo
      schema: prod
    permissions:
      - user_name: scott.johnson@databricks.com
        level: CAN_MANAGE
