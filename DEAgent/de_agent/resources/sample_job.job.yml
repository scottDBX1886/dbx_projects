# A sample job for de_agent.

resources:
  jobs:
    sample_job:
      name: sample_job

      #email_notifications:
      #  on_failure:
      #    - your_email@example.com

      parameters:
        - name: catalog
          default: ${var.catalog}
        - name: schema
          default: ${var.schema}

      tasks:
        - task_key: refresh_pipeline
          pipeline_task:
            pipeline_id: ${resources.pipelines.de_agent_etl.id}

      environments:
        - environment_key: default
          spec:
            environment_version: "2"
